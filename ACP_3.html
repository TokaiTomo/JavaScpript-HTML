<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="randoms()">Press to Initiate</button>
    <script>
        function randoms(){
            var i;
            let set=""
            for(i=0;i<5;i++){
                set+=Math.floor(Math.random()*100)+",";
            }
            document.write(set+"<br>")
            document.write(new Date().toLocaleDateString()+"<br>")
            document.write(Math.floor(Math.random()*100)+"<br>")
        }
        
    </script>
</body>
</html>
