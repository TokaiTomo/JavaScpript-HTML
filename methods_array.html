<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Join and Pop</h1>
    <script>
        var food=["Ramen","Sushi","Chicken","Steak"]
        document.write(food.join("/")+"<br>")
        document.write(food+"<br>")
        food.pop()
        document.write(food+"<br>")    
    </script>
</body>
</html>
