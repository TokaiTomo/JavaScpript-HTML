<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: 'Courier New', Courier, monospace;
            background-color: aqua;
            text-align: center;
            padding:30px;
        }
        h1{
            color:rgb(0, 0, 0)
        }
        #zoo{
            border: 2px solid ;
            width: 300px;
            margin:16px auto;
            padding:12px;
            border-radius: 10px;
            background:lightgreen;
        }
        .zone{
            border:1px solid;
            margin:6px 0;
            padding:8px 12px;
            border-radius: 6px;
            text-align:left
        }
        button{
            background-color:darkturquoise;
            cursor:pointer;
            border-radius:100px;
            border:1.5px solid;
            padding:5px 12px;
            font-size: large;
        }
    </style>
</head>
<body>
    <h1>Zooooooooo</h1>
    <div id="zoo">
        <div class="zone">Zone 1: <span id="zone1"></span></div>
        <div class="zone">Zone 2: <span id="zone2"></span></div>
        <div class="zone">Zone 3: <span id="zone3"></span></div>
        <div class="zone">Total Animals: <span id="zone4"></span></div>
    </div>
    <br>
    <button onclick="zoo()">Open The Zoo</button>
    <p id="status"></p>
    <script>
        function zoo(){
            document.getElementById("zone1").innerHTML="Lion"
            document.getElementById("zone2").innerHTML="Penguin"
            document.getElementById("zone3").innerHTML="Elephant"
            document.getElementById("zone4").innerHTML=3


        }
    </script>
</body>
</html>
