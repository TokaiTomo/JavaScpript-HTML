<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var value=Math.abs(-123);
        document.write("Absolute of -123 "+value+"<br>");

        var value=Math.acos(-1)
        document.write("Acos of -1= "+value+"<br>")

        var value=Math.asin(1)
        document.write("Asin of 1= "+value+"<br>")

        var value=Math.tan(1)
        document.write("tan of 1= "+value+"<br>")
    </script>
</body>
</html>
