<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Calculator</h1>
    <h3 id="add"></h3>
    <h3 id="sub"></h3>
    <h3 id="time"></h3>
    <h3 id="div"></h3>
    <script>
        var x=Number(prompt("Input your first number: "));
        var y=Number(prompt("Input your second number: "));
        var add=x+y;
        var sub=x-y;
        var time=x*y;
        var div=x/y;
        document.getElementById("add").innerHTML="Addition="+add
        document.getElementById("sub").innerHTML="Subtraction="+sub
        document.getElementById("time").innerHTML="Multiplication="+time
        document.getElementById("div").innerHTML="Division="+div

    </script>
</body>
</html>
