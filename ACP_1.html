<body>
    <h1>Calculator</h1>
    <h3 id="add"></h3>
    <h3 id="sub"></h3>
    <h3 id="time"></h3>
    <h3 id="div"></h3>

        var x=Number(prompt("Input your first number: "));
        var y=Number(prompt("Input your second number: "));

        var sub=x-y
        var time=x*y
        var div=x/y

    </script>
