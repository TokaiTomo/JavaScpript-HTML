<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Call stack</h1>
    <script>
        function add(a,b){
            document.write("in add()");
            return a+b
        }
        function average(a,b){
            document.write("in average()");
            let sum=add(a,b);
            document.write("in average()");
            return sum/2
        }
        results=average(1,2);
        document.write(results);
    </script>
</body>
</html>
