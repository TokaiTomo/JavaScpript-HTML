<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>
</head>
<body>
<button onclick="showProfile()">Show</button>
<div>Name: <span id="name"></span></div>
<div>Score: <span id="score"></span></div>
<div>Top Score: <span id="top"></span></div>
<div>Rank: <span id="rank"></span></div>
<div>Greetings: <span id="greet"></span></div>
<div>Stars: <span id="star"></span></div>
<div>Bonus: <span id="bonus"></span></div>
<div>Team Name: <span id="team"></span></div>
<script>
function showProfile() {
let name = "Alex";
let score = 75;
let top = 100;
let bonus = null;
let team;
let rank;
if (score >= 80) {
rank = "Gold";
}
else if (score >= 50) {
rank = "Silver";
}
else {
rank = "Bronze";
}
let hour = new Date().getHours();
let greeting;
if (hour < 12) {
greeting = "Good Morning";
}
else if (hour < 17) {
greeting = "Good Afternoon";
}
else {
greeting = "Good Evening";
}
let stars = "";
let count = 0;
while (count < 5) {
stars = stars + "*";
count = count + 1;
}
document.getElementById("name").innerHTML = name;
document.getElementById("score").innerHTML = score;
document.getElementById("top").innerHTML = top;
document.getElementById("rank").innerHTML = rank;
document.getElementById("greet").innerHTML = greeting;
document.getElementById("star").innerHTML = stars;
document.getElementById("bonus").innerHTML = bonus;
document.getElementById("team").innerHTML = team;
}
</script>
</body>
</html>
