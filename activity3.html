<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>JavaScript Statements</h1>
    <p>A <mark>JavaScript Program</mark> is a bunch of <mark>statements</mark> for the computer to execute.</p>
    <p id="demo"></p>
    <script>
        var x,y,z;//Statement 1
        x=12;//Statement 2
        y=5;//Statement 3
        z=x+y;//Statement 4
        document.getElementById("demo").innerHTML="The value of z is "+z+"."
    </script>
</body>
</html>
