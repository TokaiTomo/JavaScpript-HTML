<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>A function can access things inside and outside of the function</p>
    <button type="button" onclick="myfunction()">Button</button>
    <p id="demo"></p>
    <script>
        var a=5;
        function myfunction(){
            var b=4;
            document.getElementById("demo").innerHTML=b*a;
        }

    </script>
</body>
</html>
